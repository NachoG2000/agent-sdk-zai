<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PreOp app icon">
  <defs>
    <clipPath id="preop-rounded">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#preop-rounded)">
    <!-- Cream background -->
    <rect width="512" height="512" fill="#F2EAD9"/>

    <!-- Orbital ring: two arcs with gaps near top-right and bottom-left -->
    <g fill="none" stroke="#2B1F1A" stroke-width="14" stroke-linecap="round">
      <!-- Long arc: from top (~12 o'clock-ish) sweeping clockwise around the left & bottom to lower-right -->
      <path d="M 332 92
               A 168 168 0 1 0 360 410"/>
      <!-- Short arc: from upper-right to lower-right (closes the right side, leaving a gap up top for the dot) -->
      <path d="M 410 168
               A 168 168 0 0 1 380 408"/>
    </g>

    <!-- Floating orange dot (the "moon") -->
    <circle cx="372" cy="132" r="22" fill="#C45A2C"/>

    <!-- Main "D" mark -->
    <path d="M 196 132
             C 290 132 360 188 360 256
             C 360 324 290 380 196 380
             L 196 132 Z"
          fill="#2B1F1A"/>

    <!-- Play triangle cutout inside the D -->
    <path d="M 232 200
             L 232 312
             L 314 256 Z"
          fill="#F2EAD9"/>

    <!-- Orange swoosh ribbon flowing through the bottom-right of the D -->
    <path d="M 332 240
             C 322 290 300 340 274 392
             C 264 412 250 424 232 428
             L 232 396
             C 248 388 262 374 272 354
             C 290 314 304 274 312 232 Z"
          fill="#C45A2C"/>
  </g>
</svg>
