<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PreOp">
  <defs>
    <clipPath id="r">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="64" height="64" fill="#F2EAD9"/>

    <!-- Simplified ring at small sizes: single arc + dot reads better than two-arc detail -->
    <circle cx="32" cy="32" r="22" fill="none" stroke="#2B1F1A" stroke-width="2.5"/>
    <circle cx="48" cy="18" r="3.5" fill="#C45A2C"/>

    <!-- D shape -->
    <path d="M 22 16
             C 34 16 43 23 43 32
             C 43 41 34 48 22 48
             L 22 16 Z"
          fill="#2B1F1A"/>

    <!-- Play triangle -->
    <path d="M 26 24 L 26 40 L 38 32 Z" fill="#F2EAD9"/>

    <!-- Swoosh -->
    <path d="M 40 30
             C 38 36 35 43 30 49
             C 28 51 26 52 24 52
             L 24 48
             C 26 47 28 45 30 42
             C 33 37 36 32 38 28 Z"
          fill="#C45A2C"/>
  </g>
</svg>
