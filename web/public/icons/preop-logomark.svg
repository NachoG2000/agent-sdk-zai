<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PreOp logomark">
  <!-- Transparent background — symbol only -->

  <!-- Orbital ring: two arcs with gaps -->
  <g fill="none" stroke="#2B1F1A" stroke-width="14" stroke-linecap="round">
    <path d="M 332 92
             A 168 168 0 1 0 360 410"/>
    <path d="M 410 168
             A 168 168 0 0 1 380 408"/>
  </g>

  <!-- Floating orange dot -->
  <circle cx="372" cy="132" r="22" fill="#C45A2C"/>

  <!-- Main "D" mark -->
  <path d="M 196 132
           C 290 132 360 188 360 256
           C 360 324 290 380 196 380
           L 196 132 Z"
        fill="#2B1F1A"/>

  <!-- Play triangle cutout (cream shows through; on transparent bg this should match container color) -->
