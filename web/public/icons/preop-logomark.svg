           L 232 312
           L 314 256 Z"
        fill="#F2EAD9"/>

  <!-- Orange swoosh ribbon -->
  <path d="M 332 240
           C 322 290 300 340 274 392
           C 264 412 250 424 232 428
           L 232 396
           C 248 388 262 374 272 354
           C 290 314 304 274 312 232 Z"
        fill="#C45A2C"/>
</svg>
